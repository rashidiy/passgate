<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ovqat Buyurtma Qilish</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 30px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            text-align: center;
        }

        h1 {
            color: #343a40;
            font-size: 2.5rem;
            margin-bottom: 25px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .card-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .card {
            border: 2px solid #ced4da;
            border-radius: 20px;
            cursor: pointer;
            text-align: center;
            width: 100%;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.4s ease;
            height: 100px;
            overflow: hidden;
            background: linear-gradient(135deg, #ffffff, #f8f9fa);
            position: relative;
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            background: linear-gradient(135deg, #007bff, #0056b3);
        }

        .card:hover label {
            color: white;
        }

        .card input[type="radio"] {
            display: none;
        }

        .card label {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: bold;
            color: #495057;
            border-radius: 20px;
            height: 100%;
            width: 100%;
            transition: all 0.4s ease;
            background: transparent;
        }

        .card input[type="radio"]:checked + label {
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white;
            box-shadow: 0 10px 20px rgba(0, 123, 255, 0.4);
            border-radius: 20px;
        }

        button {
            padding: 15px 25px;
            background: linear-gradient(135deg, #28a745, #218838);
            color: #fff;
            border: none;
            border-radius: 30px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 30px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            background: linear-gradient(135deg, #218838, #1e7e34);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
            font-weight: bold;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease-in-out;
        }

        #loading-overlay img {
            width: 100px;
            height: auto;
            margin-bottom: 20px;
        }

        #loading-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .error-message {
            display: none;
            font-size: 2rem;
            font-weight: bold;
            margin-top: 20px;
        }

        /* Override for error messages inside notification overlay */
        .notification-content .error-message {
            display: block;
        }

        .loader-line {
            width: 100%;
            height: 5px;
            background-color: black;
            position: relative;
            overflow: hidden;
        }

        .loader-line:before {
            content: "";
            width: 100%;
            border: 3px solid white;
            position: absolute;
            top: 0;
            left: 0;
            animation: loading 10s linear;
        }

        @keyframes loading {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(-100%);
            }
        }

        button:disabled,
        button.disabled {
            background: #d6d6d6; /* Gray background */
            color: #000000; /* Light gray text */
            cursor: not-allowed; /* Show "not allowed" cursor */
            box-shadow: none; /* Remove shadow for disabled buttons */
            border: 1px solid black;
            opacity: 0.5;
        }

        .notification {
            padding: 15px;
            margin-top: 20px;
            border-radius: 5px;
            font-size: 1.2rem;
            text-align: center;
        }

        .notification.success {
            background-color: #d4edda;
            color: #155724;
        }

        .notification.error {
            background-color: #f8d7da;
            color: #721c24;
        }

        .notification-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8); /* Semi-transparent background */
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000; /* Ensure it appears above other elements */
            opacity: 1;
            transition: opacity 0.5s ease-in-out;
        }

        .notification-overlay.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .notification-content {
            color: #fff;
            text-align: center;
            padding: 20px;
        }

        .success-message {
            font-size: 2rem;
            font-weight: bold;
        }

        body.no-scroll {
            overflow: hidden;
        }


        .loader-line:before {
            content: "";
            width: 100%;
            border: 3px solid white;
            position: absolute;
            top: 0;
            left: 0;
            animation: loading 10s linear;
        }

        @keyframes loading {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(-100%);
            }
        }

        .size-6 {
            width: 60px;
            height: 60px;
            margin: 0 auto 10px auto;
        }

        .notification-content {
            color: #fff;
            text-align: center;
            padding: 20px;
        }

        .notification-content svg {
            display: block;
            margin: 0 auto 10px auto;
        }

        .notification-content .success-message,
        .notification-content .error-message {
            font-size: 2rem;
            font-weight: bold;
            margin-top: 10px;
        }

        .notification-content svg.size-6 {
            width: 60px;
            height: 60px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Ovqat Buyurtma Qilish</h1>

    <form method="post">
        {% csrf_token %}
        <div class="card-container">
            {% for value, label in form.food_size.field.choices %}
                <div class="card">
                    <input
                            type="radio"
                            name="{{ form.food_size.html_name }}"
                            value="{{ value }}"
                            id="choice_{{ forloop.counter }}"
                            {% if form.food_size.value == value %} checked {% endif %}
                    >
                    <label for="choice_{{ forloop.counter }}">
                        {{ label }}
                    </label>
                </div>
            {% endfor %}
        </div>
        <button type="submit">Buyurtma berish</button>
    </form>
</div>

{% if success_message or error_message %}
    <div id="notification-overlay" class="notification-overlay">
        <div class="notification-content">
            {% if success_message %}
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                     stroke="green" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/>
                </svg>

                <p class="success-message">{{ success_message }}</p>
            {% endif %}
            {% if error_message %}
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                     stroke="red" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="m9.75 9.75 4.5 4.5m0-4.5-4.5 4.5M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/>
                </svg>

                <p class="error-message">{{ error_message }}</p>
            {% endif %}
        </div>
    </div>
{% endif %}

<div id="loading-overlay">
    <div>
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <style>
                    .cls-1, .cls-2 {
                        fill: none;
                    }

                    .cls-2 {
                        stroke: #fff;
                        stroke-linecap: round;
                        stroke-linejoin: round;
                    }
                </style>
            </defs>
            <g data-name="Layer 2" id="Layer_2">
                <g id="Workspace">
                    <rect class="cls-1" height="24" width="24"/>
                    <line class="cls-2" x1="8" x2="8" y1="9" y2="11"/>
                    <line class="cls-2" x1="16" x2="16" y1="9" y2="11"/>
                    <path class="cls-2" d="M12,9v3a1,1,0,0,1-1,1h0"/>
                    <path class="cls-2" d="M9.5,15a3.63,3.63,0,0,0,5,0h0"/>
                    <path class="cls-2" d="M8,5H6A1,1,0,0,0,5,6V8"/>
                    <path class="cls-2" d="M16,5h2a1,1,0,0,1,1,1V8"/>
                    <path class="cls-2" d="M19,16v2a1,1,0,0,1-1,1H16"/>
                    <path class="cls-2" d="M8,19H6a1,1,0,0,1-1-1V16"/>
                </g>
            </g>
        </svg>
        <div id="loader-line">

        </div>
        <p>Kameraga qarang!</p>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const radioButtons = document.querySelectorAll('input[type="radio"][name="{{ form.food_size.html_name }}"]');
        const submitButton = document.querySelector("button[type='submit']");

        // Initially disable the button
        submitButton.disabled = true;
        submitButton.classList.add("disabled");

        // Add an event listener to each radio button
        radioButtons.forEach((radio) => {
            radio.addEventListener("change", function () {
                if (document.querySelector('input[type="radio"][name="{{ form.food_size.html_name }}"]:checked')) {
                    // Enable the button when a selection is made
                    submitButton.disabled = false;
                    submitButton.classList.remove("disabled");
                }
            });
        });
    });
    
    document.addEventListener("DOMContentLoaded", function () {
        const form = document.querySelector('form');
        const overlay = document.getElementById('loading-overlay');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Prevent default form submission
            const loaderLine = document.getElementById("loader-line");
            overlay.classList.add('active');
            loaderLine.classList.add('loader-line');

            const formData = new FormData(form);

            const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;

            let timeoutId = setTimeout(() => {
                loaderLine.classList.remove('loader-line');
                overlay.classList.remove('active');

                // Display error message
                displayErrorMessage("Yuz aniqlanmadi.");
            }, 10000);

            fetch(form.action, {
                method: 'POST',
                body: formData,
                headers: {
                    'X-CSRFToken': csrfToken,
                    'X-Requested-With': 'XMLHttpRequest'
                }
            })
                .then(response => response.json())
                .then(data => {
                    clearTimeout(timeoutId);
                    loaderLine.classList.remove('loader-line');
                    overlay.classList.remove('active');

                    if (data.success) {
                        displaySuccessMessage(data.message);
                    } else {
                        displayErrorMessage(data.message);
                    }
                })
                .catch(error => {
                    clearTimeout(timeoutId);
                    loaderLine.classList.remove('loader-line');
                    overlay.classList.remove('active');

                    displayErrorMessage("Server xatosi yuz berdi.");
                });
        });

        function displayErrorMessage(message) {
            const notificationOverlay = document.createElement('div');
            notificationOverlay.id = 'notification-overlay';
            notificationOverlay.className = 'notification-overlay';

            const notificationContent = document.createElement('div');
            notificationContent.className = 'notification-content';

            // Create the SVG element for error
            const errorSVG = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            errorSVG.setAttribute("xmlns", "http://www.w3.org/2000/svg");
            errorSVG.setAttribute("fill", "none");
            errorSVG.setAttribute("viewBox", "0 0 24 24");
            errorSVG.setAttribute("stroke-width", "1.5");
            errorSVG.setAttribute("stroke", "red");
            errorSVG.setAttribute("class", "size-6");

            const errorPath = document.createElementNS("http://www.w3.org/2000/svg", "path");
            errorPath.setAttribute("stroke-linecap", "round");
            errorPath.setAttribute("stroke-linejoin", "round");
            errorPath.setAttribute("d", "m9.75 9.75 4.5 4.5m0-4.5-4.5 4.5M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z");

            errorSVG.appendChild(errorPath);

            const errorMessage = document.createElement('p');
            errorMessage.className = 'error-message';
            errorMessage.textContent = message;

            notificationContent.appendChild(errorSVG);
            notificationContent.appendChild(errorMessage);
            notificationOverlay.appendChild(notificationContent);
            document.body.appendChild(notificationOverlay);

            // Disable scrolling
            document.body.classList.add('no-scroll');

            // Hide the notification after 1 second
            setTimeout(function () {
                notificationOverlay.classList.add('fade-out');

                notificationOverlay.addEventListener('transitionend', function () {
                    // Remove the overlay from the DOM
                    if (notificationOverlay.parentNode) {
                        notificationOverlay.parentNode.removeChild(notificationOverlay);
                    }
                    // Enable scrolling
                    document.body.classList.remove('no-scroll');
                });
            }, 1000);
        }

        function displaySuccessMessage(message) {
            const notificationOverlay = document.createElement('div');
            notificationOverlay.id = 'notification-overlay';
            notificationOverlay.className = 'notification-overlay';

            const notificationContent = document.createElement('div');
            notificationContent.className = 'notification-content';

            // Create the SVG element for success
            const successSVG = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            successSVG.setAttribute("xmlns", "http://www.w3.org/2000/svg");
            successSVG.setAttribute("fill", "none");
            successSVG.setAttribute("viewBox", "0 0 24 24");
            successSVG.setAttribute("stroke-width", "1.5");
            successSVG.setAttribute("stroke", "lightgreen");
            successSVG.setAttribute("class", "size-6");

            const successPath = document.createElementNS("http://www.w3.org/2000/svg", "path");
            successPath.setAttribute("stroke-linecap", "round");
            successPath.setAttribute("stroke-linejoin", "round");
            successPath.setAttribute("d", "M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z");

            successSVG.appendChild(successPath);

            const successMessage = document.createElement('p');
            successMessage.className = 'success-message';
            successMessage.textContent = message;

            notificationContent.appendChild(successSVG);
            notificationContent.appendChild(successMessage);
            notificationOverlay.appendChild(notificationContent);
            document.body.appendChild(notificationOverlay);

            // Disable scrolling
            document.body.classList.add('no-scroll');

            // Hide the notification after 1 second
            setTimeout(function () {
                notificationOverlay.classList.add('fade-out');

                notificationOverlay.addEventListener('transitionend', function () {
                    // Remove the overlay from the DOM
                    if (notificationOverlay.parentNode) {
                        notificationOverlay.parentNode.removeChild(notificationOverlay);
                    }
                    // Enable scrolling
                    document.body.classList.remove('no-scroll');
                });
            }, 1000);
        }
    });
</script>

</body>
</html>
